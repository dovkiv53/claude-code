<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<style>
  *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:sans-serif; background:#f0f4f8; display:flex; flex-direction:column; min-height:100dvh; }
  header { background:#0d6efd; color:#fff; padding:10px 16px; position:sticky; top:0; z-index:10; }
  nav { background:#fff; display:flex; border-bottom:2px solid #dee2e6; position:sticky; top:0; z-index:9; }
  nav button { flex:1; padding:10px; border:none; background:none; font-size:14px; font-weight:600; cursor:pointer; }
  main { flex:1; padding:12px; }
  .view { display:none; }
  .view.active { display:flex; flex-direction:column; gap:16px; width:100%; }

  /* WIZARD - last in stylesheet */
  #view-logger .wizard-card { display:none !important; }
  #view-logger .wizard-card.wiz-active-card { display:block !important; background:#fff; border-radius:12px; padding:18px; }
  .wiz-nav { display:flex; gap:10px; margin-top:16px; padding-top:16px; border-top:1px solid #dee2e6; }
  .wiz-next { flex:1; background:#0d6efd; color:#fff; border:none; border-radius:10px; padding:13px; font-size:16px; font-weight:600; cursor:pointer; }
  .wiz-back { background:#f0f4f8; color:#666; border:1.5px solid #dee2e6; border-radius:10px; padding:13px; font-size:16px; font-weight:600; cursor:pointer; }
</style>
</head>
<body>
<header>Fish Logger</header>
<nav>
  <button>Logger</button>
</nav>
<main>
  <div id="view-logger" class="view active">

    <div class="wizard-card wiz-active-card" data-step="1">
      <h2>Step 1 — Setup</h2>
      <p>Select email app</p>
      <select><option>Gmail</option><option>Outlook</option></select>
      <div class="wiz-nav">
        <button class="wiz-next" onclick="go(2)">Next →</button>
      </div>
    </div>

    <div class="wizard-card" data-step="2">
      <h2>Step 2 — Delivery</h2>
      <input type="text" placeholder="Vessel name" style="width:100%;padding:10px;border:1px solid #ddd;border-radius:8px;font-size:16px;" />
      <div class="wiz-nav">
        <button class="wiz-back" onclick="go(1)">← Back</button>
        <button class="wiz-next" onclick="go(3)">Next →</button>
      </div>
    </div>

    <div class="wizard-card" data-step="3">
      <h2>Step 3 — Buyer</h2>
      <input type="text" placeholder="Buyer name" style="width:100%;padding:10px;border:1px solid #ddd;border-radius:8px;font-size:16px;" />
      <div class="wiz-nav">
        <button class="wiz-back" onclick="go(2)">← Back</button>
      </div>
    </div>

  </div>
</main>
<script>
function go(n) {
  document.querySelectorAll('.wizard-card').forEach(c => c.classList.remove('wiz-active-card'));
  document.querySelector('.wizard-card[data-step="' + n + '"]').classList.add('wiz-active-card');
  window.scrollTo(0,0);
}
</script>
</body>
</html>
