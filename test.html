<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<style>
  *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:sans-serif; background:#f0f4f8; display:flex; flex-direction:column; height:100dvh; overflow:hidden; }
  header { background:#0d6efd; color:#fff; padding:10px 16px; flex-shrink:0; }
  nav { background:#fff; display:flex; border-bottom:2px solid #dee2e6; flex-shrink:0; }
  nav button { flex:1; padding:10px; border:none; background:none; font-size:14px; font-weight:600; cursor:pointer; }
  main { flex:1; overflow-y:auto; padding:12px; display:flex; flex-direction:column; }
  .view { display:none; }
  .view.active { display:flex; flex-direction:column; flex:1; }

  /* WIZARD */
  #view-logger .wizard-card { display:none !important; }
  #view-logger .wizard-card.wiz-active-card {
    display:flex !important;
    flex-direction:column;
    flex:1;
    background:#fff;
    border-radius:12px;
    padding:18px;
  }
  .wiz-nav { display:flex; gap:10px; margin-top:auto; padding-top:16px; border-top:1px solid #dee2e6; }
  .wiz-next { flex:1; background:#0d6efd; color:#fff; border:none; border-radius:10px; padding:13px; font-size:16px; font-weight:600; cursor:pointer; }
  .wiz-back { background:#f0f4f8; color:#666; border:1.5px solid #dee2e6; border-radius:10px; padding:13px; font-size:16px; font-weight:600; cursor:pointer; }
</style>
</head>
<body>
<header>Fish Logger</header>
<nav><button>Logger</button></nav>
<main>
  <div id="view-logger" class="view active">

    <div class="wizard-card wiz-active-card" data-step="1">
      <h2 style="font-size:20px;margin-bottom:16px;">Step 1 — Setup</h2>
      <label style="font-size:16px;color:#666;font-weight:600;">Email App</label>
      <select style="font-size:18px;padding:12px;border:1.5px solid #ddd;border-radius:8px;margin-top:6px;width:100%;">
        <option>Gmail</option><option>Outlook</option>
      </select>
      <div class="wiz-nav">
        <button class="wiz-next" onclick="go(2)">Next →</button>
      </div>
    </div>

    <div class="wizard-card" data-step="2">
      <h2 style="font-size:20px;margin-bottom:16px;">Step 2 — Delivery</h2>
      <label style="font-size:16px;color:#666;font-weight:600;">Vessel</label>
      <input type="text" placeholder="e.g. Sea Star" style="font-size:18px;padding:12px;border:1.5px solid #ddd;border-radius:8px;margin-top:6px;width:100%;" />
      <div class="wiz-nav">
        <button class="wiz-back" onclick="go(1)">← Back</button>
        <button class="wiz-next" onclick="go(3)">Next →</button>
      </div>
    </div>

    <div class="wizard-card" data-step="3">
      <h2 style="font-size:20px;margin-bottom:16px;">Step 3 — Buyer</h2>
      <label style="font-size:16px;color:#666;font-weight:600;">Buyer Name</label>
      <input type="text" placeholder="e.g. John Smith" style="font-size:18px;padding:12px;border:1.5px solid #ddd;border-radius:8px;margin-top:6px;width:100%;" />
      <div class="wiz-nav">
        <button class="wiz-back" onclick="go(2)">← Back</button>
      </div>
    </div>

  </div>
</main>
<script>
function go(n) {
  document.querySelectorAll('.wizard-card').forEach(c => c.classList.remove('wiz-active-card'));
  document.querySelector('.wizard-card[data-step="' + n + '"]').classList.add('wiz-active-card');
  window.scrollTo(0,0);
}
</script>
</body>
</html>
