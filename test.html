function getGasUrl() { return (typeof FISH_GAS_URL !== 'undefined' && FISH_GAS_URL) || ''; }
async function gasCall(params) {
  const url = getGasUrl(); if (!url) return null;
  try {
    const qs = new URLSearchParams(Object.fromEntries(Object.entries(params).map(([k,v])=>[k,typeof v==='object'?JSON.stringify(v):String(v)])));
    const r = await fetch(`${url}?${qs}`); return JSON.parse(await r.text());
  } catch(e) { return null; }
}
async function loadUsers() {
  const d = await gasCall({action:'getUsers'});
  if (d?.users?.length) { localStorage.setItem('fish_users',JSON.stringify(d.users)); return d.users; }
  const local = JSON.parse(localStorage.getItem('fish_users')||'[]');
  if (local.length && getGasUrl()) await gasCall({action:'saveUsers',users:local});
  return local;
}
async function saveUsers(users) {
  localStorage.setItem('fish_users',JSON.stringify(users));
  await gasCall({action:'saveUsers',users});
}
async function loadRecords(username) {
  const d = await gasCall({action:'getRecords',user:username});
  if (d?.records?.length) { localStorage.setItem(`fish_records_${username}`,JSON.stringify(d.records)); return d.records; }
  return JSON.parse(localStorage.getItem(`fish_records_${username}`)||'[]');
}
async function pushRecord(username, rec) {
  const cached = JSON.parse(localStorage.getItem(`fish_records_${username}`)||'[]');
  cached.push(rec); localStorage.setItem(`fish_records_${username}`,JSON.stringify(cached));
  if (getGasUrl()) return gasCall({action:'pushRecord',user:username,record:rec});
}

// --- Buyer storage (per user, synced via GAS when configured) ---
// Local cache mirrors remote; if GAS is configured, remote wins on load
// and every save is pushed. Matches the pattern used by loadUsers/saveUsers.
function loadBuyersLocal(username) {
  try { return JSON.parse(localStorage.getItem(`fish_buyers_${username}`)||'[]'); }
  catch(e) { return []; }
}
async function loadBuyers(username) {
  if (getGasUrl()) {
    const d = await gasCall({action:'getBuyers', user:username});
    if (d && Array.isArray(d.buyers)) {
      localStorage.setItem(`fish_buyers_${username}`, JSON.stringify(d.buyers));
      return d.buyers;
    }
    // If remote had nothing but we have local data, push it up so next device sees it
    const local = loadBuyersLocal(username);
    if (local.length) await gasCall({action:'saveBuyers', user:username, buyers:local});
    return local;
  }
  return loadBuyersLocal(username);
}
async function saveBuyers(username, buyers) {
  localStorage.setItem(`fish_buyers_${username}`, JSON.stringify(buyers));
  if (getGasUrl()) await gasCall({action:'saveBuyers', user:username, buyers});
}
function findBuyer(buyers, name) {
  if (!name) return null;
  const k = name.trim().toLowerCase();
  return buyers.find(b => (b.name||'').trim().toLowerCase() === k) || null;
}

const todayISO = () => new Date().toISOString().slice(0,10);
const nowTime = () => { const n=new Date(); return `${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}`; };
const fmt = (n,dec=1) => Number(n).toFixed(dec);

// Parse a value (ISO string, Date, or sheet-formatted string) into a Date
function parseDate(v) {
  if (!v) return null;
  if (v instanceof Date) return isNaN(v) ? null : v;
  // Handle 'YYYY-MM-DD' specially to avoid timezone shift
  if (typeof v === 'string' && /^\d{4}-\d{2}-\d{2}$/.test(v)) {
    const [y,m,d] = v.split('-').map(Number);
    return new Date(Date.UTC(y, m-1, d));
  }
  const p = new Date(v);
  return isNaN(p) ? null : p;
}

// Format a date for display. Spanish -> dd/mm/yyyy, English -> "Mon, Jan 15, 2026"
function formatDate(v, lang) {
  const d = parseDate(v);
  if (!d) return typeof v === 'string' ? v : '';
  if (lang === 'es') {
    const dd = String(d.getUTCDate()).padStart(2,'0');
    const mm = String(d.getUTCMonth()+1).padStart(2,'0');
    const yy = d.getUTCFullYear();
    return `${dd}/${mm}/${yy}`;
  }
  return d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric',year:'numeric',timeZone:'UTC'});
}

// Format a date+time for "generated at" lines on the receipt
function formatDateTime(v, lang) {
  const d = v instanceof Date ? v : parseDate(v);
  if (!d) return '';
  if (lang === 'es') {
    const dd = String(d.getDate()).padStart(2,'0');
    const mm = String(d.getMonth()+1).padStart(2,'0');
    const yy = d.getFullYear();
    const hh = String(d.getHours()).padStart(2,'0');
    const mi = String(d.getMinutes()).padStart(2,'0');
    return `${dd}/${mm}/${yy} ${hh}:${mi}`;
  }
  return d.toLocaleString('en-US',{weekday:'short',month:'short',day:'numeric',year:'numeric',hour:'numeric',minute:'2-digit',hour12:true});
}

// ---------------- Buyer autocomplete input ----------------
function BuyerAutocomplete({value, onChange, buyers, onPick, placeholder, tR}) {
  const [open, setOpen] = useState(false);
  const [hi, setHi] = useState(0);
  const ref = useRef(null);

  const matches = useMemo(() => {
    const q = (value||'').trim().toLowerCase();
    if (!q) return buyers.slice(0, 8);
    return buyers.filter(b => (b.name||'').toLowerCase().includes(q)).slice(0, 8);
  }, [value, buyers]);

  useEffect(() => { setHi(0); }, [value, buyers.length]);

  useEffect(() => {
    const onDoc = (e) => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener('mousedown', onDoc);
    return () => document.removeEventListener('mousedown', onDoc);
  }, []);

  const pick = (b) => {
    onChange(b.name);
    onPick && onPick(b);
    setOpen(false);
  };

  return (
    <div ref={ref} style={{position:'relative'}}>
      <input
        style={inp}
        value={value}
        onChange={e=>{ onChange(e.target.value); setOpen(true); }}
        onFocus={()=>setOpen(true)}
        onKeyDown={e=>{
          if (!open) return;
          if (e.key==='ArrowDown') { e.preventDefault(); setHi(h=>Math.min(h+1, matches.length-1)); }
          else if (e.key==='ArrowUp') { e.preventDefault(); setHi(h=>Math.max(h-1, 0)); }
          else if (e.key==='Enter' && matches[hi]) { e.preventDefault(); pick(matches[hi]); }
          else if (e.key==='Escape') { setOpen(false); }
        }}
        placeholder={placeholder}
        autoComplete="off"
      />
      {open && matches.length > 0 && (
        <div style={{position:'absolute',top:'100%',left:0,right:0,background:C.card,border:`1.5px solid ${C.border}`,borderRadius:8,marginTop:4,boxShadow:'0 4px 16px rgba(0,0,0,.12)',zIndex:10,maxHeight:'18rem',overflowY:'auto'}}>
          {matches.map((b,i)=>(
            <div key={b.name} onMouseDown={e=>{e.preventDefault();pick(b);}}
              style={{padding:'0.75rem 0.875rem',cursor:'pointer',background:i===hi?'#e8f0fe':'transparent',borderBottom:i<matches.length-1?`1px solid ${C.border}`:'none'}}>
              <div style={{fontWeight:700,fontSize:'1rem'}}>{b.name}</div>
              {(b.email||b.phone) && <div style={{fontSize:'0.85rem',color:C.muted,marginTop:2}}>{[b.email,b.phone].filter(Boolean).join(' · ')}</div>}
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

  const [cNote, setCNote] = useState('');
  const [catches, setCatches] = useState([]);
  const [currency, setCurrency] = useState('$');
  const [price, setPrice] = useState('');
  const [finModal, setFinModal] = useState(false);
  const [resetModal, setResetModal] = useState(false);
  const [delIdx, setDelIdx] = useState(null);

  // New buyer prompt (shown when user tries to advance with an unknown name)
  const [newBuyerModal, setNewBuyerModal] = useState(false);
  const [nbEmail, setNbEmail] = useState('');
  const [nbPhone, setNbPhone] = useState('');

  useEffect(() => {
    try {
      const s = JSON.parse(localStorage.getItem(sk)||'null');
      if (s) {
        setEmailApp(s.emailApp||'mailto'); setVessel(s.vessel||''); setDate(s.date||todayISO());
        setSpecies(s.species||''); setBuyerName(s.buyerName||'');
        setCatches(s.catches||[]);
        setCurrency(s.currency||'$'); setPrice(s.price||'');
      }
    } catch(e) {}
  }, []);

  const save = (patch={}) => {
    localStorage.setItem(sk, JSON.stringify({emailApp,vessel,date,species,buyerName,catches,currency,price,...patch}));
  };

  const totalW = catches.reduce((s,c)=>s+c.weight,0);
  const priceN = parseFloat(price);
  const hasP = !isNaN(priceN) && priceN > 0;
  const totalP = hasP ? totalW * priceN : null;

  // Resolve buyer details from saved list
  const matchedBuyer = findBuyer(buyers, buyerName);

  const addCatch = () => {
    const w = parseFloat(cWeight);
    if (!cTime) { toast(t('enterTime')); return; }
    if (isNaN(w)||w<=0) { toast(t('enterWeight')); return; }
    const nc = [...catches,{time:cTime,weight:w,note:cNote}];
    setCatches(nc); save({catches:nc}); setCWeight(''); setCNote(''); setCTime(nowTime());
    toast(t('toastCatchRecorded',nc.length,fmt(w)));
  };

  const delCatch = (i) => {
    const nc = catches.filter((_,j)=>j!==i);
    setCatches(nc); save({catches:nc}); setDelIdx(null); toast(t('toastCatchRemoved'));
  };

  const doReset = () => {
    setCatches([]); setVessel(''); setSpecies(''); setDate(todayISO());
    setPrice(''); setCurrency('$'); setBuyerName('');
    localStorage.removeItem(sk); setResetModal(false); setStep(1); toast(t('toastReset'));
  };

  // When user tries to advance from step 2, check if buyer exists
  const advanceFromBuyerStep = () => {
    const name = buyerName.trim();
    if (!name) { setStep(3); return; } // allow empty buyer (optional)
    if (findBuyer(buyers, name)) { setStep(3); return; }
    // Not found — prompt to save
    setNbEmail(''); setNbPhone('');
    setNewBuyerModal(true);
  };

  const saveNewBuyer = () => {
    const name = buyerName.trim();
    if (!name) return;
    const nb = { name, email:nbEmail.trim(), phone:nbPhone.trim(), createdAt:new Date().toISOString() };
    const next = [...buyers, nb];
    setBuyers(next);
    saveBuyers(user.username, next);
    setNewBuyerModal(false);
    toast(t('buyerSaved', name));
    setStep(3);
  };

  const skipSaveBuyer = () => {
    // User chooses not to save — continue anyway with just the name
    setNewBuyerModal(false);
    setStep(3);
  };

  const doFinalise = async () => {
    const b = matchedBuyer || { name: buyerName.trim(), email:'', phone:'' };
    const rec = {id:Date.now(),date,vessel:vessel||'(unnamed)',species:species||'(unknown)',catches:catches.slice(),totalWeight:totalW,pricePerKg:hasP?priceN:null,currency,totalPrice:hasP?parseFloat(totalP.toFixed(2)):null,buyerName:b.name,buyerEmail:b.email||'',buyerPhone:b.phone||'',savedAt:new Date().toISOString()};
    const lines = [t('rcptTitle'),`Date:       ${formatDate(date, lang)}`,`Vessel:     ${vessel||'(unnamed)'}`,`Species:    ${species||'(unknown)'}`,
      ...(b.name?[`Buyer:      ${b.name}`]:[]),...(b.email?[`Email:      ${b.email}`]:[]),...(b.phone?[`Phone:      ${b.phone}`]:[]),
      '','#   Time    Weight (kg)  Note','--- ------  -----------  ----',
      ...catches.map((c,i)=>`${String(i+1).padStart(3)}  ${c.time.slice(0,5)}   ${fmt(c.weight,2).padStart(10)}  ${c.note||''}`),
      '',`Total catches : ${catches.length}`,`Total weight  : ${fmt(totalW,2)} kg`,
      ...(hasP?[`Price / kg    : ${currency}${fmt(priceN,2)}`,`TOTAL PRICE   : ${currency}${totalP.toFixed(2)}`]:[]),
      '',`Generated: ${formatDateTime(new Date(), lang)}`];
    const txt = lines.join('\n');

    // 1. Download receipt file
    const a = document.createElement('a'); a.href=URL.createObjectURL(new Blob([txt],{type:'text/plain'}));
    a.download=`harvest_${date}_${(vessel||'unnamed').replace(/\s+/g,'_')}.txt`; a.click();

    setFinModal(false); toast(t('toastSaved'));

    // 2. Save to sheet
    const res = await pushRecord(user.username,rec);
    if (res?.ok) toast(t('toastSheetOk'));

    // 3. Open email draft if buyer has an email address.
    // Always use the user's selected email app — mailto: on mobile opens
    // the native mail composer pre-filled with to/subject/body.
    if (b.email) {
      // Read the latest emailApp choice fresh — user may have changed it in Settings
      let currentApp = 'mailto';
      try { currentApp = (JSON.parse(localStorage.getItem(sk)||'{}').emailApp) || 'mailto'; } catch(e) {}
      const sub = encodeURIComponent(t('rcptSubject',date));
      const body = encodeURIComponent(txt);
      const to = encodeURIComponent(b.email);
      const urls = {
        mailto:  `mailto:${to}?subject=${sub}&body=${body}`,
        gmail:   `https://mail.google.com/mail/?view=cm&to=${to}&su=${sub}&body=${body}`,
        outlook: `https://outlook.live.com/mail/0/deeplink/compose?to=${to}&subject=${sub}&body=${body}`,
        yahoo:   `https://compose.mail.yahoo.com/?to=${to}&subject=${sub}&body=${body}`,
        proton:  `https://mail.proton.me/u/0/inbox#compose?to=${to}&subject=${sub}&body=${body}`,
        zoho:    `https://mail.zoho.com/zm/#compose;to=${to};subject=${sub};body=${body}`,
      };
      const url = urls[currentApp] || urls.mailto;
      // mailto: must use location.href (window.open blocks it on many mobile browsers);
      // web mail URLs get a new tab.
      if (url.startsWith('mailto:')) {
        window.location.href = url;
      } else {
        window.open(url, '_blank');
      }
    }

    // 4. Reset the form for the next delivery.
    // Do this last so the receipt/email still sees the data.
    setTimeout(() => {
      setCatches([]); setVessel(''); setSpecies(''); setDate(todayISO());
      setPrice(''); setBuyerName('');
      localStorage.removeItem(sk);
      setStep(1);
    }, 300);
  };

  const times = catches.map(c=>c.time.slice(0,5)).sort();
  const dur = times.length>1?`${times[0]} – ${times[times.length-1]}`:times[0]||'—';
  const stepLabel = (n) => <span style={{float:'right',fontWeight:700,fontSize:'0.85rem',color:C.blue,background:'#e8f0fe',borderRadius:'1rem',padding:'2px 10px'}}>{n} / 5</span>;

  return (
    <div style={{flex:1,overflowY:'auto',padding:12}}>

      {step===1 && <div style={card}>
        <div style={cardTitle}>{t('ctDelivery')}{stepLabel(1)}</div>
        <Field label={t('lblVessel')}><input style={inp} value={vessel} onChange={e=>setVessel(e.target.value)} placeholder={t('phVessel')} /></Field>
        <Field label={t('lblDate')}><input style={inp} type="date" value={date} onChange={e=>setDate(e.target.value)} /></Field>
        <Field label={t('lblSpecies')}><input style={inp} value={species} onChange={e=>setSpecies(e.target.value)} placeholder={t('phSpecies')} /></Field>
        <div style={{display:'flex',gap:'0.75rem'}}>
          <Field label={t('lblCurrency')}><input style={{...inp,maxWidth:'4rem',textAlign:'center'}} value={currency} onChange={e=>setCurrency(e.target.value)} maxLength={5} /></Field>
          <div style={{flex:3}}><Field label={t('lblPricePerKg')}><input style={inp} type="number" value={price} onChange={e=>setPrice(e.target.value)} placeholder="0.00" min="0" step="0.01" inputMode="decimal" /></Field></div>
        </div>
        <WizNav next={2} onNext={()=>setStep(2)} />
      </div>}

      {step===2 && <div style={card}>
        <div style={cardTitle}>{t('ctBuyer')}{stepLabel(2)}</div>
        <Field label={t('lblBuyerName')}>
          <BuyerAutocomplete
            value={buyerName}
            onChange={v=>{ setBuyerName(v); save({buyerName:v}); }}
            onPick={b=>{ setBuyerName(b.name); save({buyerName:b.name}); }}
            buyers={buyers}
            placeholder={t('phBuyerName')}
            tR={t}
          />
        </Field>
        {matchedBuyer && (
          <div style={{background:'#e8f5e9',border:'1.5px solid #c8e6c9',borderRadius:8,padding:'0.75rem 0.875rem',marginBottom:'1rem'}}>
            <div style={{fontSize:'0.8rem',color:C.green,fontWeight:700,textTransform:'uppercase',letterSpacing:'.06em'}}>✓ {t('buyerMatched', matchedBuyer.name)}</div>
            {(matchedBuyer.email||matchedBuyer.phone) && <div style={{fontSize:'0.9rem',color:C.muted,marginTop:4}}>{[matchedBuyer.email,matchedBuyer.phone].filter(Boolean).join(' · ')}</div>}
          </div>
        )}
        <p style={{fontSize:'0.85rem',color:C.muted,marginBottom:'0.5rem'}}>
          {lang==='es'
            ? 'Administra tus compradores (correo, teléfono) en la pestaña Ajustes.'
            : 'Manage your buyers (email, phone) in the Settings tab.'}
        </p>
        <WizNav prev={2} next={3} onPrev={()=>setStep(1)} onNext={advanceFromBuyerStep} />
      </div>}

      {step===3 && <div style={card}>
        <div style={cardTitle}>{t('ctAddCatch')}{stepLabel(3)}</div>
        <Field label={t('lblTime')}><input style={inp} type="time" value={cTime} onChange={e=>setCTime(e.target.value)} /></Field>
        <Field label={t('lblWeight')}><input style={inp} type="number" value={cWeight} onChange={e=>setCWeight(e.target.value)} placeholder="0.0" min="0" step="0.1" inputMode="decimal" onKeyDown={e=>e.key==='Enter'&&addCatch()} /></Field>
        <Field label={t('lblNote')}><input style={inp} value={cNote} onChange={e=>setCNote(e.target.value)} placeholder={t('phNote')} /></Field>
        <button style={btn('primary')} onClick={addCatch}>{t('btnRecordCatch')}</button>
        {catches.length > 0 && <div style={{background:C.bg,borderRadius:'0.6rem',padding:'0.75rem 1rem',marginTop:'0.75rem',display:'grid',gridTemplateColumns:'1fr 1fr',gap:'0.5rem'}}>
          <div><div style={{fontSize:'0.75rem',color:C.muted,fontWeight:600,textTransform:'uppercase'}}>Catches</div><div style={{fontSize:'1.3rem',fontWeight:800}}>{catches.length}</div></div>
          <div><div style={{fontSize:'0.75rem',color:C.muted,fontWeight:600,textTransform:'uppercase'}}>Total Weight</div><div style={{fontSize:'1.3rem',fontWeight:800}}>{fmt(totalW)} kg</div></div>
          {hasP && <div style={{gridColumn:'1/-1'}}><div style={{fontSize:'0.75rem',color:C.muted,fontWeight:600,textTransform:'uppercase'}}>Running Total</div><div style={{fontSize:'1.3rem',fontWeight:800,color:C.green}}>{currency}{(totalW*priceN).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2})}</div></div>}
        </div>}
        <WizNav prev={3} next={4} onPrev={()=>setStep(2)} onNext={()=>setStep(4)} nextLabel={`View Catches (${catches.length}) →`} />
      </div>}

      {step===4 && <div style={card}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:14}}>
          <div style={{...cardTitle,marginBottom:0}}>{t('ctCatches')}<span style={{fontWeight:400,fontSize:11,color:C.muted,marginLeft:8}}>4/5</span></div>
          <span style={{background:C.blue,color:'#fff',borderRadius:50,padding:'2px 10px',fontSize:12,fontWeight:700}}>{catches.length}</span>
        </div>
        {catches.length===0 ? <p style={{textAlign:'center',color:C.muted,fontSize:14,padding:'24px 0'}}>{t('noCatches')}</p> :
          catches.map((c,i)=>(
            <div key={i} style={{border:`1.5px solid ${C.border}`,borderRadius:10,padding:'12px 14px',display:'flex',alignItems:'center',gap:10,background:'#fafdff',marginBottom:8}}>
              <div style={{background:C.blue,color:'#fff',borderRadius:'50%',width:30,height:30,display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,fontWeight:700,flexShrink:0}}>{i+1}</div>
              <div style={{flex:1}}>
                <div style={{fontSize:'1.1rem',fontWeight:700}}>{fmt(c.weight)} kg</div>
                <div style={{fontSize:13,color:C.muted}}>{c.time.slice(0,5)}{c.note?' · '+c.note:''}</div>
              </div>
              <button onClick={()=>setDelIdx(i)} style={{background:'#fff0f0',color:C.red,border:'none',borderRadius:7,padding:'7px 10px',fontSize:14,cursor:'pointer',flexShrink:0}}>✕</button>
            </div>
          ))
        }
        <WizNav prev={4} next={5} onPrev={()=>setStep(3)} onNext={()=>setStep(5)} />
      </div>}

      {step===5 && <div style={card}>
        <div style={cardTitle}>{t('ctSummary')}{stepLabel(5)}</div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:16}}>
          {[
            [t('slCatches'),catches.length,t('suHauls'),false],
            [t('slWeight'),fmt(totalW),'kg',false],
            [t('slAvg'),catches.length?fmt(totalW/catches.length):'—','kg',false],
            [t('slDur'),dur,'',false],
          ].map(([label,val,unit,hi])=>(
            <div key={label} style={{background:hi?'#e8f5e9':C.bg,borderRadius:10,padding:14,display:'flex',flexDirection:'column',gap:3}}>
              <span style={{fontSize:12,color:C.muted,fontWeight:700,textTransform:'uppercase',letterSpacing:'.06em'}}>{label}</span>
              <span style={{fontSize:'1.5rem',fontWeight:800,color:hi?C.green:C.text,lineHeight:1.1}}>{val}</span>
              {unit && <span style={{fontSize:12,color:C.muted}}>{unit}</span>}
            </div>
          ))}
        </div>
        <div style={{background:hasP&&totalW>0?'linear-gradient(135deg,#1b5e20,#2e7d32)':'linear-gradient(135deg,#78909c,#90a4ae)',color:'#fff',borderRadius:12,padding:18,textAlign:'center',marginBottom:16}}>
          <div style={{fontSize:14,opacity:.85,fontWeight:600,textTransform:'uppercase',letterSpacing:'.07em'}}>{t('lblTotalPrice')}</div>
          <div style={{fontSize:'2rem',fontWeight:800}}>{hasP&&totalW>0?`${currency}${(totalW*priceN).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2})}`:'—'}</div>
        </div>
        <button style={btn('success')} onClick={()=>catches.length?setFinModal(true):toast(t('toastNoFinaliseCatch'))}>{t('btnFinalise')}</button>
        <div style={{marginTop:10}}><button style={btn('outline')} onClick={()=>setResetModal(true)}>{t('btnReset')}</button></div>
        <WizNav prev={4} onPrev={()=>setStep(4)} />
      </div>}

      <Modal open={finModal} title={t('btnFinalise')}
        body={`${vessel||'(unnamed)'} · ${species||'(unknown)'}\n${date} · ${catches.length} catches · ${fmt(totalW,2)} kg${hasP?`\n${currency}${totalP.toFixed(2)}`:''}${matchedBuyer?`\nBuyer: ${matchedBuyer.name}`:(buyerName?`\nBuyer: ${buyerName}`:'')}`}
        onClose={()=>setFinModal(false)}
        actions={[<button key="b" style={btn('outline')} onClick={()=>setFinModal(false)}>{t('btnBack')}</button>,<button key="c" style={btn('success')} onClick={doFinalise}>{t('btnConfirmSave')}</button>]} />

      <Modal open={resetModal} title={t('btnReset')} body="All current catch data will be cleared. This cannot be undone."
        onClose={()=>setResetModal(false)}
        actions={[<button key="c" style={btn('outline')} onClick={()=>setResetModal(false)}>{t('btnCancel')}</button>,<button key="r" style={btn('danger')} onClick={doReset}>{t('btnClearReset')}</button>]} />

      <Modal open={delIdx!==null} title="Remove Catch?" body={delIdx!=null?`#${delIdx+1}: ${fmt(catches[delIdx]?.weight)} kg @ ${catches[delIdx]?.time}`:''}
        onClose={()=>setDelIdx(null)}
        actions={[<button key="c" style={btn('outline')} onClick={()=>setDelIdx(null)}>{t('btnCancel')}</button>,<button key="r" style={btn('danger')} onClick={()=>delCatch(delIdx)}>{t('btnRemove')}</button>]} />

      {/* New-buyer prompt: shown when user leaves step 2 with an unknown name */}
      <Modal open={newBuyerModal}
        title={t('newBuyerPrompt', buyerName.trim())}
        body={t('newBuyerIntro')}
        onClose={()=>setNewBuyerModal(false)}
        actions={[
          <button key="skip" style={btn('outline')} onClick={skipSaveBuyer}>{lang==='es'?'Omitir':'Skip'}</button>,
          <button key="save" style={btn('success')} onClick={saveNewBuyer}>{t('btnSaveBuyer')}</button>
        ]}>
        <Field label={t('lblBuyerEmail')}><input style={inp} type="email" value={nbEmail} onChange={e=>setNbEmail(e.target.value)} placeholder={t('phBuyerEmail')} /></Field>
        <Field label={t('lblBuyerPhone')}><input style={inp} type="tel" value={nbPhone} onChange={e=>setNbPhone(e.target.value)} placeholder={t('phBuyerPhone')} /></Field>
      </Modal>
    </div>
  );
}

function HistoryTab({user, lang}) {
  const t = (k,...a) => { const v=TR[lang][k]??TR.en[k]??k; return typeof v==='function'?v(...a):v; };
  const [recs, setRecs] = useState([]);
  const [from, setFrom] = useState(''); const [to, setTo] = useState('');
  const [fV, setFV] = useState(''); const [fS, setFS] = useState('');
  const [sort, setSort] = useState('date-desc');
  useEffect(()=>{ loadRecords(user.username).then(setRecs); },[]);
  const toISO = d => { try { const p=new Date(d); return isNaN(p)?d:p.toISOString().slice(0,10); } catch(e) { return d; } };
  let filtered = recs.filter(r=>{ const rd=toISO(r.date); return (!from||rd>=from)&&(!to||rd<=to)&&(!fV||r.vessel.toLowerCase().includes(fV.toLowerCase()))&&(!fS||r.species.toLowerCase().includes(fS.toLowerCase())); });
  filtered = [...filtered].sort((a,b)=>{
    const aD = toISO(a.date), bD = toISO(b.date);
    switch(sort){
      case 'date-asc': return aD.localeCompare(bD);
      case 'date-desc': return bD.localeCompare(aD);
      case 'weight-asc': return a.totalWeight-b.totalWeight;
      case 'weight-desc': return b.totalWeight-a.totalWeight;
      case 'price-asc': return (a.totalPrice??-Infinity)-(b.totalPrice??-Infinity);
      case 'price-desc': return (b.totalPrice??-Infinity)-(a.totalPrice??-Infinity);
      default: return 0;
    }
  });
  const totalW = filtered.reduce((s,r)=>s+r.totalWeight,0);
  const priced = filtered.filter(r=>r.totalPrice!=null);
  const totalP = priced.reduce((s,r)=>s+r.totalPrice,0);
  return (
    <div style={{flex:1,overflowY:'auto',padding:12}}>
      <div style={card}>
        <div style={cardTitle}>{t('ctFilter')}</div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:12}}>
          <Field label={t('lblFrom')}><input style={inp} type="date" value={from} onChange={e=>setFrom(e.target.value)} /></Field>
          <Field label={t('lblTo')}><input style={inp} type="date" value={to} onChange={e=>setTo(e.target.value)} /></Field>
          <Field label={t('lblVessel')}><input style={inp} value={fV} onChange={e=>setFV(e.target.value)} placeholder="" /></Field>
          <Field label={t('lblSpecies')}><input style={inp} value={fS} onChange={e=>setFS(e.target.value)} placeholder="" /></Field>
        </div>
        <button style={{...btn('primary'),marginBottom:'0.75rem'}} onClick={()=>loadRecords(user.username).then(setRecs)}>🔍 Search</button>
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          <label style={lbl}>Sort</label>
          <select style={inp} value={sort} onChange={e=>setSort(e.target.value)}>
            {[
            ['date-desc', t('sortDateNewest')],
            ['date-asc', t('sortDateOldest')],
            ['weight-desc', t('sortWeightHigh')],
            ['weight-asc', t('sortWeightLow')],
            ['price-desc', t('sortPriceHigh')],
            ['price-asc', t('sortPriceLow')],
          ].map(([val, label]) => <option key={val} value={val}>{label}</option>)}
          </select>
        </div>
      </div>
      {filtered.length>0 && <div style={card}>
        <div style={cardTitle}>{t('ctTotals')}</div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
          <div style={{background:C.bg,borderRadius:10,padding:14}}><div style={{fontSize:12,color:C.muted,fontWeight:700,textTransform:'uppercase'}}>{t('slDeliveries')}</div><div style={{fontSize:'1.5rem',fontWeight:800}}>{filtered.length}</div></div>
          <div style={{background:C.bg,borderRadius:10,padding:14}}><div style={{fontSize:12,color:C.muted,fontWeight:700,textTransform:'uppercase'}}>{t('slWeight')}</div><div style={{fontSize:'1.5rem',fontWeight:800}}>{fmt(totalW)}</div><div style={{fontSize:12,color:C.muted}}>kg</div></div>
          {priced.length>0&&<div style={{background:'#e8f5e9',borderRadius:10,padding:14}}><div style={{fontSize:12,color:C.muted,fontWeight:700,textTransform:'uppercase'}}>{t('slTotalValue')}</div><div style={{fontSize:'1.5rem',fontWeight:800,color:C.green}}>{priced[0].currency}{totalP.toLocaleString(undefined,{minimumFractionDigits:2})}</div></div>}
          <div style={{background:C.bg,borderRadius:10,padding:14}}><div style={{fontSize:12,color:C.muted,fontWeight:700,textTransform:'uppercase'}}>{t('slAvgWeight')}</div><div style={{fontSize:'1.5rem',fontWeight:800}}>{fmt(totalW/filtered.length)}</div><div style={{fontSize:12,color:C.muted}}>kg</div></div>
        </div>
      </div>}
      {filtered.length===0 ? <p style={{textAlign:'center',color:C.muted,fontSize:14,padding:'32px 0'}}>{t('noRecords')}</p> :
        filtered.map(r=>{
          const cc=Array.isArray(r.catches)?r.catches.length:0;
          const bm=[r.buyerName,r.buyerEmail,r.buyerPhone].filter(Boolean).join(' · ');
          return <div key={r.id} style={{...card,padding:'14px 16px'}}>
            <div style={{fontSize:'1.1rem',fontWeight:700,marginBottom:2}}>{formatDate(r.date, lang)}</div>
            <div style={{fontSize:'0.9rem',color:C.muted,marginBottom:bm?4:10}}>{r.vessel} · {r.species}</div>
            {bm&&<div style={{fontSize:'0.9rem',color:C.muted,marginBottom:10}}>{bm}</div>}
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'0.5rem',marginTop:'0.5rem'}}>
              <div style={{background:C.bg,borderRadius:'0.5rem',padding:'0.5rem 0.75rem'}}>
                <div style={{fontSize:'0.75rem',color:C.muted,fontWeight:600,textTransform:'uppercase'}}>Catches</div>
                <div style={{fontSize:'1.4rem',fontWeight:800}}>{cc}</div>
              </div>
              <div style={{background:C.bg,borderRadius:'0.5rem',padding:'0.5rem 0.75rem'}}>
                <div style={{fontSize:'0.75rem',color:C.muted,fontWeight:600,textTransform:'uppercase'}}>Weight</div>
                <div style={{fontSize:'1.4rem',fontWeight:800}}>{fmt(r.totalWeight)} kg</div>
              </div>
              {r.pricePerKg!=null&&<div style={{background:C.bg,borderRadius:'0.5rem',padding:'0.5rem 0.75rem'}}>
                <div style={{fontSize:'0.75rem',color:C.muted,fontWeight:600,textTransform:'uppercase'}}>Price/kg</div>
                <div style={{fontSize:'1.4rem',fontWeight:800}}>{r.currency}{fmt(r.pricePerKg,2)}</div>
              </div>}
              {r.totalPrice!=null&&<div style={{background:'#e8f5e9',borderRadius:'0.5rem',padding:'0.5rem 0.75rem'}}>
                <div style={{fontSize:'0.75rem',color:C.green,fontWeight:600,textTransform:'uppercase'}}>Total</div>
                <div style={{fontSize:'1.4rem',fontWeight:800,color:C.green}}>{r.currency}{r.totalPrice.toLocaleString(undefined,{minimumFractionDigits:2})}</div>
              </div>}
            </div>
          </div>;
        })}
    </div>
  );
}

// ---------------- Settings (email app + Saved Buyers) ----------------
function SettingsTab({user, lang, toast, buyers, setBuyers}) {
  const t = (k,...a) => { const v=TR[lang][k]??TR.en[k]??k; return typeof v==='function'?v(...a):v; };
  const sk = `fish_state_${user.username}`;
  const [emailApp, setEmailApp] = useState(() => {
    try { return JSON.parse(localStorage.getItem(sk)||'{}').emailApp||'mailto'; } catch(e) { return 'mailto'; }
  });
  const saveEmailApp = (app) => {
    try {
      const s = JSON.parse(localStorage.getItem(sk)||'{}');
      s.emailApp = app;
      localStorage.setItem(sk, JSON.stringify(s));
    } catch(e) {}
  };

  // Buyer management state
  const [editing, setEditing] = useState(null); // null | {index, name, email, phone} | {index:-1, ...} for new
  const [bErr, setBErr] = useState('');
  const [delIdx, setDelIdx] = useState(null);

  const openNew = () => { setEditing({index:-1, name:'', email:'', phone:''}); setBErr(''); };
  const openEdit = (i) => { const b = buyers[i]; setEditing({index:i, name:b.name, email:b.email||'', phone:b.phone||''}); setBErr(''); };
  const cancelEdit = () => { setEditing(null); setBErr(''); };

  const saveEditing = () => {
    const name = (editing.name||'').trim();
    if (!name) { setBErr(t('errBuyerNameReq')); return; }
    // Check duplicate (ignore current one when editing)
    const dup = buyers.findIndex((b,i) => i!==editing.index && (b.name||'').trim().toLowerCase() === name.toLowerCase());
    if (dup !== -1) { setBErr(t('errBuyerExists', name)); return; }
    let next;
    if (editing.index === -1) {
      next = [...buyers, { name, email:(editing.email||'').trim(), phone:(editing.phone||'').trim(), createdAt:new Date().toISOString() }];
      toast(t('buyerSaved', name));
    } else {
      next = buyers.slice();
      next[editing.index] = { ...next[editing.index], name, email:(editing.email||'').trim(), phone:(editing.phone||'').trim() };
      toast(t('buyerUpdated', name));
    }
    setBuyers(next); saveBuyers(user.username, next);
    setEditing(null); setBErr('');
  };

  const removeBuyer = (i) => {
    const nm = buyers[i].name;
    const next = buyers.filter((_,j)=>j!==i);
    setBuyers(next); saveBuyers(user.username, next);
    setDelIdx(null);
    toast(t('buyerRemoved', nm));
  };

  return (
    <div style={{flex:1,overflowY:'auto',padding:'1rem'}}>
      <div style={card}>
        <div style={cardTitle}>{t('ctSetup')}</div>
        <Field label={t('lblEmailApp')}>
          <select style={{...inp}} value={emailApp} onChange={e=>{setEmailApp(e.target.value);saveEmailApp(e.target.value);}}>
            {Object.entries(EMAIL_APPS).map(([k,v])=><option key={k} value={k}>{v}</option>)}
          </select>
        </Field>
      </div>

      <div style={card}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:14}}>
          <div style={{...cardTitle,marginBottom:0}}>{t('ctBuyers')}</div>
          <span style={{background:C.blue,color:'#fff',borderRadius:50,padding:'2px 10px',fontSize:12,fontWeight:700}}>{buyers.length}</span>
        </div>

        {buyers.length === 0
          ? <p style={{textAlign:'center',color:C.muted,fontSize:14,padding:'16px 0 20px'}}>{t('noBuyers')}</p>
          : buyers.map((b,i)=>(
              <div key={b.name+i} style={{border:`1.5px solid ${C.border}`,borderRadius:10,padding:'12px 14px',display:'flex',alignItems:'center',gap:10,background:'#fafdff',marginBottom:8}}>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontWeight:700,fontSize:15}}>{b.name}</div>
                  {(b.email||b.phone) && <div style={{fontSize:12,color:C.muted,marginTop:3,wordBreak:'break-all'}}>{[b.email,b.phone].filter(Boolean).join(' · ')}</div>}
                </div>
                <button onClick={()=>openEdit(i)} style={{background:'#e8f0fe',color:C.blue,border:'none',borderRadius:7,padding:'7px 10px',fontSize:13,fontWeight:600,cursor:'pointer',flexShrink:0}}>✎</button>
                <button onClick={()=>setDelIdx(i)} style={{background:'#fff0f0',color:C.red,border:'none',borderRadius:7,padding:'7px 10px',fontSize:14,cursor:'pointer',flexShrink:0}}>✕</button>
              </div>
            ))}

        <button style={{...btn('primary'),marginTop:6}} onClick={openNew}>{t('btnAddBuyer')}</button>
      </div>

      <Modal open={!!editing}
        title={editing && editing.index===-1 ? t('ctAddBuyer') : t('ctEditBuyer')}
        onClose={cancelEdit}
        actions={[
          <button key="c" style={btn('outline')} onClick={cancelEdit}>{t('btnCancel')}</button>,
          <button key="s" style={btn('success')} onClick={saveEditing}>{editing && editing.index===-1 ? t('btnSaveBuyer') : t('btnUpdateBuyer')}</button>
        ]}>
        {editing && <>
          <Field label={t('lblBuyerName')}>
            <input style={inp} value={editing.name} onChange={e=>setEditing({...editing, name:e.target.value})} placeholder="e.g. John Smith" autoFocus />
          </Field>
          <Field label={t('lblBuyerEmail')}>
            <input style={inp} type="email" value={editing.email} onChange={e=>setEditing({...editing, email:e.target.value})} placeholder={t('phBuyerEmail')} />
          </Field>
          <Field label={t('lblBuyerPhone')}>
            <input style={inp} type="tel" value={editing.phone} onChange={e=>setEditing({...editing, phone:e.target.value})} placeholder={t('phBuyerPhone')} />
          </Field>
          {bErr && <div style={{fontSize:14,color:C.red,marginBottom:8}}>{bErr}</div>}
        </>}
      </Modal>

      <Modal open={delIdx!==null}
        title={t('btnRemoveBuyer')}
        body={delIdx!==null ? t('deleteBuyerMsg', buyers[delIdx]?.name||'') : ''}
        onClose={()=>setDelIdx(null)}
        actions={[
          <button key="c" style={btn('outline')} onClick={()=>setDelIdx(null)}>{t('btnCancel')}</button>,
          <button key="r" style={btn('danger')} onClick={()=>removeBuyer(delIdx)}>{t('btnRemoveBuyer')}</button>
        ]} />
    </div>
  );
}

function AdminTab({user, lang, toast}) {
  const t = (k,...a) => { const v=TR[lang][k]??TR.en[k]??k; return typeof v==='function'?v(...a):v; };
  const [users, setUsers] = useState([]);
  const [newU, setNewU] = useState(''); const [newP, setNewP] = useState(''); const [isAdm, setIsAdm] = useState(false);
  const [err, setErr] = useState(''); const [delU, setDelU] = useState(null);
  const reload = () => loadUsers().then(setUsers);
  useEffect(()=>{ reload(); },[]);
  const addUser = async () => {
    if (!newU) { setErr(t('errUsernameReq')); return; }
    if (newP.length<4) { setErr(t('errPassMin')); return; }
    if (users.find(u=>u.username===newU)) { setErr((TR[lang].errUserExists||TR.en.errUserExists)(newU)); return; }
    await saveUsers([...users,{username:newU,password:newP,isAdmin:isAdm,createdAt:new Date().toISOString()}]);
    setNewU(''); setNewP(''); setIsAdm(false); setErr('');
    toast((TR[lang].toastUserAdded||TR.en.toastUserAdded)(newU)); reload();
  };
  const removeUser = async (u) => {
    if (u.username===user.username) { toast(t('errCantDeleteSelf')); return; }
    const rem = users.filter(x=>x.username!==u.username);
    if (!rem.some(x=>x.isAdmin)) { toast(t('errCantRemoveLast')); return; }
    localStorage.removeItem(`fish_state_${u.username}`);
    localStorage.removeItem(`fish_records_${u.username}`);
    localStorage.removeItem(`fish_buyers_${u.username}`);
    await saveUsers(rem); toast((TR[lang].toastUserRemoved||TR.en.toastUserRemoved)(u.username));
    setDelU(null); reload();
  };
  return (
    <div style={{flex:1,overflowY:'auto',padding:12}}>
      <div style={card}>
        <div style={cardTitle}>{t('ctAddUser')}</div>
        <Field label={t('lblUsername')}><input style={inp} value={newU} onChange={e=>setNewU(e.target.value)} placeholder="e.g. john" autoComplete="off" /></Field>
        <Field label={t('lblPassword')}><input style={inp} type="password" value={newP} onChange={e=>setNewP(e.target.value)} placeholder={t('phAtLeast4')} autoComplete="new-password" /></Field>
        <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:12}}>
          <input type="checkbox" id="adm" checked={isAdm} onChange={e=>setIsAdm(e.target.checked)} style={{width:18,height:18}} />
          <label htmlFor="adm" style={{fontSize:14,cursor:'pointer'}}>{t('lblGrantAdmin')}</label>
        </div>
        <div style={{fontSize:14,color:C.red,minHeight:18,marginBottom:8}}>{err}</div>
        <button style={btn('primary')} onClick={addUser}>{t('btnAddUser')}</button>
      </div>
      <div style={card}>
        <div style={cardTitle}>{t('ctAllUsers')}</div>
        {users.length===0?<p style={{textAlign:'center',color:C.muted,fontSize:14}}>{t('noUsers')}</p>:
          users.map(u=>(
            <div key={u.username} style={{border:`1.5px solid ${C.border}`,borderRadius:10,padding:'12px 14px',display:'flex',alignItems:'center',justifyContent:'space-between',gap:10,background:'#fafdff',marginBottom:8}}>
              <div>
                <div style={{fontWeight:700,fontSize:15}}>{u.username}</div>
                <div style={{fontSize:12,color:C.muted,marginTop:3}}>
                  <span style={{background:u.isAdmin?'#fff3cd':'#e8f4fd',color:u.isAdmin?'#856404':'#0c63e4',borderRadius:50,padding:'2px 8px',fontSize:12,fontWeight:700}}>{u.isAdmin?t('roleAdmin'):t('roleUser')}</span>
                  {' · '}{t('addedOn')} {formatDate(u.createdAt, lang)}
                </div>
              </div>
              {u.username!==user.username
                ?<button onClick={()=>setDelU(u)} style={{background:'#fff0f0',color:C.red,border:'none',borderRadius:7,padding:'7px 10px',fontSize:14,cursor:'pointer'}}>✕</button>
                :<span style={{fontSize:12,color:C.muted,fontStyle:'italic'}}>{t('you')}</span>}
            </div>
          ))}
      </div>
      <Modal open={!!delU} title={t('btnRemoveUser')} body={delU?(TR[lang].deleteUserMsg||TR.en.deleteUserMsg)(delU.username):''}
        onClose={()=>setDelU(null)}
        actions={[<button key="c" style={btn('outline')} onClick={()=>setDelU(null)}>{t('btnCancel')}</button>,<button key="r" style={btn('danger')} onClick={()=>removeUser(delU)}>{t('btnRemoveUser')}</button>]} />
    </div>
  );
}

function LoginScreen({onLogin, lang, setLang}) {
  const t = (k,...a) => { const v=TR[lang][k]??TR.en[k]??k; return typeof v==='function'?v(...a):v; };
  const [users, setUsers] = useState(null);
  const [u, setU] = useState(''); const [p, setP] = useState(''); const [err, setErr] = useState('');
  const [busy, setBusy] = useState(false); const [showReset, setShowReset] = useState(false);
  const [su, setSu] = useState(''); const [sp, setSp] = useState(''); const [sp2, setSp2] = useState(''); const [serr, setSerr] = useState('');
  useEffect(()=>{
    (async()=>{
      const us = await loadUsers(); setUsers(us);
      try {
        const sess = JSON.parse(localStorage.getItem('fish_session')||'null');
        if (sess) { const f=us.find(x=>x.username===sess.username&&x.password===sess.password); if(f){onLogin(f,us);return;} }
      } catch(e) {}
    })();
  },[]);
  const doLogin = async () => {
    if (!u||!p) { setErr(t('errPassCredentials')); return; }
    setBusy(true); const us=await loadUsers(); setBusy(false);
    const f=us.find(x=>x.username===u&&x.password===p);
    if (!f) { setErr(t('errInvalidCreds')); setShowReset(true); return; }
    localStorage.setItem('fish_session',JSON.stringify(f)); onLogin(f,us);
  };
  const doSetup = async () => {
    if (!su) { setSerr(t('errUsernameReq')); return; }
    if (sp.length<4) { setSerr(t('errPassMin')); return; }
    if (sp!==sp2) { setSerr(t('errPassMatch')); return; }
    setBusy(true);
    const admin={username:su,password:sp,isAdmin:true,createdAt:new Date().toISOString()};
    await saveUsers([admin]); localStorage.setItem('fish_session',JSON.stringify(admin)); onLogin(admin,[admin]);
  };
  const cardStyle = {background:C.card,borderRadius:'var(--radius)',boxShadow:'0 4px 24px rgba(0,0,0,.12)',padding:'32px 24px',width:'100%',maxWidth:'24rem'};
  if (users===null) return <div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100dvh',background:C.bg}}><div style={cardStyle}><h1 style={{fontSize:20,fontWeight:800}}>Fish Logger</h1><p style={{color:C.muted,fontSize:14,marginTop:4}}>{t('loading')}</p></div></div>;
  return (
    <div style={{display:'flex',alignItems:'center',justifyContent:'center',minHeight:'100dvh',background:C.bg,padding:'1rem'}}>
      <div style={cardStyle}>
        <h1 style={{fontSize:20,fontWeight:800,marginBottom:4}}>Fish Logger</h1>
        <p style={{fontSize:14,color:C.muted,marginBottom:20}}>{users.length===0?t('firstTimeSetup'):t('signIn')}</p>
        {users.length===0 ? <>
          <p style={{fontSize:13,color:C.muted,marginBottom:16,lineHeight:1.5}}>{t('setupIntro')}</p>
          <Field label={t('lblAdminUsername')}><input style={inp} value={su} onChange={e=>setSu(e.target.value)} placeholder={t('phChooseUsername')} /></Field>
          <Field label={t('lblPassword')}><input style={inp} type="password" value={sp} onChange={e=>setSp(e.target.value)} placeholder={t('phAtLeast4')} /></Field>
          <Field label={t('lblConfirmPassword')}><input style={inp} type="password" value={sp2} onChange={e=>setSp2(e.target.value)} placeholder={t('phRepeatPassword')} onKeyDown={e=>e.key==='Enter'&&doSetup()} /></Field>
          <div style={{fontSize:14,color:C.red,minHeight:18,marginBottom:8}}>{serr}</div>
          <button style={btn('primary')} onClick={doSetup} disabled={busy}>{busy?t('creating'):t('createAdmin')}</button>
        </> : <>
          <Field label={t('lblUsername')}><input style={inp} value={u} onChange={e=>setU(e.target.value)} placeholder={t('phEnterUsername')} autoComplete="username" onKeyDown={e=>e.key==='Enter'&&doLogin()} /></Field>
          <Field label={t('lblPassword')}><input style={inp} type="password" value={p} onChange={e=>setP(e.target.value)} placeholder={t('phEnterPassword')} autoComplete="current-password" onKeyDown={e=>e.key==='Enter'&&doLogin()} /></Field>
          <div style={{fontSize:14,color:C.red,minHeight:18,marginBottom:8}}>{err}</div>
          <button style={btn('primary')} onClick={doLogin} disabled={busy}>{busy?t('signingIn'):t('signInBtn')}</button>
          {showReset&&<p style={{textAlign:'center',marginTop:12,fontSize:13,color:C.muted}}>{t('cantLogin')} <a href="#" onClick={e=>{e.preventDefault();if(confirm(t('resetConfirm'))){localStorage.clear();location.reload();}}} style={{color:C.red}}>{t('resetData')}</a></p>}
        </>}
        <button onClick={()=>setLang(l=>{ const n=l==='en'?'es':'en'; localStorage.setItem('fish_lang',n); return n; })} style={{background:'none',border:'none',fontSize:13,color:C.muted,cursor:'pointer',marginTop:16,display:'block',width:'100%',textAlign:'center'}}>
          {lang==='en'?'🇪🇸 Español':'🇺🇸 English'}
        </button>
      </div>
    </div>
  );
}
